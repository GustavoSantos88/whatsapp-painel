<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesso ao painel de gestão WhatsApp">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="./assets/images/logo.png" type="image/png">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
</head>

<body class="center">

    <div class="login-card">
        <h1 id="brandName"></h1>
        <input type="email" id="email" placeholder="Email" required autofocus>
        <input type="password" id="password" placeholder="Senha" required>
        <button class="primary-btn" onclick="validarCampos()">Entrar</button>
    </div>

    <script src="assets/js/plugins/axios.min.js"></script>

    <script>
        const saved = localStorage.getItem("theme");
        if (saved) {
            document.body.classList.add(saved);
        } else {
            document.body.classList.add("light"); // padrão
        }
    </script>


    <script>
        const version = Date.now();

        const scripts = [
            "assets/js/config.js",
            "assets/js/toast.js",
            "assets/js/auth.js",
        ];

        scripts.forEach(src => {
            const script = document.createElement("script");
            script.src = src + "?v=" + version;
            script.defer = true;
            document.body.appendChild(script);
        });
    </script>
</body>

</html>
