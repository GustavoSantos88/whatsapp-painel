<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel de gestão WhatsApp">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="./assets/images/logo.png" type="image/png">
    <title>Painel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
</head>

<body>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="app-sidebar">
            <h2 id="brandSidebar"></h2>

            <button id="dashboardBtn" style="display:none;" onclick="loadPage('dashboard')">Dashboard</button>
            <button id="sessionsBtn" style="display:none;" onclick="loadPage('sessions')">Sessões</button>
            <button id="messagesBtn" style="display:none;" onclick="loadPage('messages')">Mensagens</button>
            <button id="webhooksBtn" style="display:none;" onclick="loadPage('webhooks')">Webhooks</button>
            <button id="adminBtn" style="display:none;" onclick="loadPage('admin')">Admin</button>

            <hr>

            <button id="changePasswordBtn" style="display:none;" onclick="loadPage('changePassword')">
                Alterar Senha
            </button>

            <button onclick="toggleTheme()">Tema</button>
            <button onclick="logout()">Sair</button>
        </aside>

        <!-- CONTEÚDO -->
        <div style="flex:1; display:flex; flex-direction:column;">

            <!-- HEADER MOBILE -->
            <div class="main-header">
                <span class="menu-toggle" onclick="toggleMenu()">☰</span>
                <strong>Painel</strong>
            </div>

            <main class="app-content" id="content"></main>
        </div>

    </div>

    <!-- OVERLAY -->
    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <script src="assets/js/js/axios.min.js"></script>
    <script src="assets/js/js/socket.io.min.js"></script>

    <script>
        const saved = localStorage.getItem("theme");
        if (saved) {
            document.body.classList.add(saved);
        } else {
            document.body.classList.add("light"); // padrão
        }
    </script>


    <script>

        function toggleMenu() {
            const sidebar = document.querySelector(".app-sidebar")
            const overlay = document.querySelector(".sidebar-overlay")

            sidebar.classList.toggle("open")
            overlay.classList.toggle("show")
        }

        document.querySelectorAll(".app-sidebar button").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelector(".app-sidebar").classList.remove("open")
                document.querySelector(".sidebar-overlay").classList.remove("show")
            })
        })

        const version = Date.now();

        const scripts = [
            // 1. Configurações e ferramentas base
            "assets/js/config.js",
            "assets/js/api.js",
            "assets/js/auth.js",
            "assets/js/socket.js",
            "assets/js/toast.js",
            "assets/js/ui.js",

            // 2. Módulos de página (Devem vir ANTES do router)
            "assets/js/modules/dashboard.js",
            "assets/js/modules/sessions.js",
            "assets/js/modules/messages.js",
            "assets/js/modules/webhooks.js",
            "assets/js/modules/admin.js",
            "assets/js/modules/changePassword.js",

            // 3. Roteador (Deve ser o ÚLTIMO para encontrar as funções acima)
            "assets/js/router.js"
        ];

        function loadScriptsSequentially(scripts) {
            if (!scripts.length) return;

            const script = document.createElement("script");
            script.src = scripts[0] + "?v=" + version;
            script.defer = true;

            script.onload = () => {
                loadScriptsSequentially(scripts.slice(1));
            };

            document.body.appendChild(script);
        }

        loadScriptsSequentially(scripts);
    </script>

</body>

</html>
