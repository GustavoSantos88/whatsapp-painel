<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel</title>
    <link rel="stylesheet" href="assets/css/base.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <h2 id="brandSidebar"></h2>
            <button id="dashboardBtn" style="display:none;" onclick="loadPage('dashboard')">Dashboard</button>
            <button id="sessionsBtn" style="display:none;" onclick="loadPage('sessions')">Sessões</button>
            <button id="messagesBtn" style="display:none;" onclick="loadPage('messages')">Mensagens</button>
            <button id="webhooksBtn" style="display:none;" onclick="loadPage('webhooks')">Webhooks</button>
            <button id="adminBtn" style="display:none;" onclick="loadPage('admin')">Admin</button>

            <hr>

            <button onclick="toggleTheme()">Tema</button>
            <button onclick="logout()">Sair</button>
        </aside>

        <main class="content" id="content"></main>

    </div>

    <script src="assets/js/js/axios.min.js"></script>
    <script src="assets/js/js/socket.io.min.js"></script>

    <script>
        const saved = localStorage.getItem("theme");
        if (saved) {
            document.body.classList.add(saved);
        } else {
            document.body.classList.add("light"); // padrão
        }
    </script>


    <script>

        const version = Date.now();

        const scripts = [
            // 1. Configurações e ferramentas base
            "assets/js/config.js",
            "assets/js/api.js",
            "assets/js/auth.js",
            "assets/js/socket.js",
            "assets/js/ui.js",

            // 2. Módulos de página (Devem vir ANTES do router)
            "assets/js/modules/dashboard.js",
            "assets/js/modules/sessions.js",
            "assets/js/modules/messages.js",
            "assets/js/modules/webhooks.js",
            "assets/js/modules/admin.js",

            // 3. Roteador (Deve ser o ÚLTIMO para encontrar as funções acima)
            "assets/js/router.js"
        ];

        function loadScriptsSequentially(scripts) {
            if (!scripts.length) return;

            const script = document.createElement("script");
            script.src = scripts[0] + "?v=" + version;
            script.defer = true;

            script.onload = () => {
                loadScriptsSequentially(scripts.slice(1));
            };

            document.body.appendChild(script);
        }

        loadScriptsSequentially(scripts);
    </script>

</body>

</html>
